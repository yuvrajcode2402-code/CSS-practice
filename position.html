<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border:4px solid rgb(73, 4, 4);
            background-color:rgba(204, 126, 93, 0.819);
            height:3444px;
        }
        /* CSS Position:static(default),relative,absolute,fixed,sticky */
        .box {
            border: 2px solid rgb(220, 72, 4);
            width: 200px;
            height: 200px;
            margin: 2px;
            display: inline-block;
        }

        #box3 {
            /* relative:relative to its normal position */
            /* position:relative; */

            /* absolute:absolute to its first parent position */
            /* position: absolute; */
            /* fixed:relative to the browser window */
            /* position:fixed; */

            /* sticky */
            position:sticky;
            top:3px;
            /* right:4px; */
            /* top: 30px;*/
           
            /* left: 130px; */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box" id="box1">1</div>
        <div class="box" id="box2">2</div>
        <div class="box" id="box3">3</div>
        <div class="box" id="box4">4</div>
    </div>
</body>

</html>
