<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visibility and z-index</title>
    <style>
        .box{
            width:170px;
            height:170px;
            border:2px solid black;
            /* margin:5px; */
        }
        #box1{
            background-color: red;
            position: relative;
            top: 50px;
            z-index: 36;
        }
        #box2{
            background-color: green;
            position: relative;
            top: 34px;
            z-index: 34;
             /* visibility: hidden;      */
            /*hide the element but leave the space */
            /* display: none;                     */
            /*hide the element as well as space*/
        }
        #box3{
            background-color: blue;
            position: relative;
            z-index: 40;
        }
        #box4{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="box" id="box1">1</div>
    <div class="box" id="box2">2</div>
    <div class="box" id="box3">3</div>
    <div class="box" id="box4">4</div>
</body>
</html>
