<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SELECTORS</title>
    <style>
        p{
            border:2px solid black;
        }
        
        /* id selector */
        #firstpara{
            color:blueviolet;
            background-color:rgb(255, 0, 0);
        }
        /* class selector */
       .Element{
        color:rgb(0, 255, 229);
        background-color:rgb(255, 0, 255);
       }
       /* particular element selector */
       div p{
        color:cadetblue;
        background-color:rgb(255, 255, 0);
       }
       /* This is a universal selector */
       footer,span{
        color:royalblue;
        background-color:rgb(247, 255, 2);
       }
       /* this is a whole body selector */
       body{
        background-color:beige;
        border:2px solid black;
       }

    </style>
</head>
<body>
    <h3>This is CSS SELECTORS</h3>
    <p id="firstpara">This tutorial will teach you everything you need to know about HTML/CSS</p>
    <p id="secondpara" class="Element bg">Lurem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    <div>
        <p>This is a paragraph inside a div element.</p>
    </div>
    <span>this is span</span>
    <footer>This is footer</footer>
    
</body>
</html>
