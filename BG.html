<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height,Width,Borders & Backgrounds</title>
    <style>
        #firstPara {
            background-color: yellow;
            height: 100px;
            width: 300px;
            border: 10px solid green;
            /* border-width:3px;
            border-color:green;
            border-style:solid; */
            border-radius: 10px;
        }

        #secondPara {
            background-color:rgb(255, 221, 0);
            height:100px;
            width:300px;
            border-top: 15px solid red;
            border-right:10px dotted blue;
            border-bottom: 20px dashed green;
            border-left: 5px double purple;
            border-top-left-radius: 4px;
            border-top-right-radius:8px;
            border-bottom-right-radius:12px;
            border-bottom-left-radius:16px;
        }

        #thirdPara{
            height: 1000px;
            width:1000px;
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTeJf48vrv3fNuFwyyIQGp00hJroGWSzI_3rn08OGob&s);
            border:10px solid yellow;
            background-repeat: no-repeat;
            background-position: center;
            

        }
    </style>
</head>

<body>
    <h2>This is a heading.</h2>
    <p id="firstPara">This is a first paragraph.</p>

    <h2>This is a second heading.</h2>
    <p id="secondPara">This is a second paragraph.</p>

    <h2 >This is a third heading.</h2>
    <p id="thirdPara">This is a third paragraph.</p>
</body>

</html>
